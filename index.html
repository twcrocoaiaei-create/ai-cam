<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stealth Loop Cam</title>
    <style>
        /* 画面全体を真っ黒に */
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; touch-action: manipulation; }
        
        /* ビデオとボタンは基本非表示 */
        video { display: none; }
        
        #controls { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); 
            z-index: 100; 
        }

        button { 
            width: 200px; padding: 20px; border: none; border-radius: 50px; 
            font-size: 18px; font-weight: bold; background: #ff3b30; color: white;
        }

        #status { 
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            font-size: 24px; text-align: center; pointer-events: none; z-index: 200;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body id="body">

<div id="status">準備完了</div>

<div id="controls">
    <button id="startBtn">撮影開始</button>
</div>

<video id="webcam" autoplay playsinline muted></video>

<script>
    const video = document.getElementById('webcam');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const controls = document.getElementById('controls');
    const body = document.getElementById('body');
    
    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;
    let recordingTimer;
    let stream;
    let tapCount = 0;
    let lastTapTime = 0;

    // 1. カメラ準備
    async function setupCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: true
            });
            video.srcObject = stream;
        } catch (e) {
            status.innerText = "カメラ許可エラー";
        }
    }

    // 2. 開始ボタン
    startBtn.onclick = async () => {
        if (!stream) await setupCamera();
        
        isRecording = true;
        controls.classList.add('hidden'); // ボタンを消す
        status.innerText = "撮影中..."; // メッセージ出す

        // 1秒後にメッセージを消して真っ暗にする
        setTimeout(() => {
            status.innerText = "";
        }, 1000);

        startNewSession();
    };

    // 3. ループ録画
    function startNewSession() {
        if (!isRecording) return;

        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        
        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            saveVideo();
            if (isRecording) startNewSession();
        };

        mediaRecorder.start();

        // 10秒ごとに区切る
        recordingTimer = setTimeout(() => {
            if (mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
        }, 10000);
    }

    // 4. 保存処理
    function saveVideo() {
        if (recordedChunks.length === 0) return;
        const blob = new Blob(recordedChunks, { type: "video/mp4" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        const now = new Date();
        const timeStr = now.getHours() + "" + now.getMinutes() + "" + now.getSeconds();
        a.download = `loop_${timeStr}.mp4`;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // 5. 【隠し機能】3回連続タップで停止
    body.onclick = () => {
        if (!isRecording) return;

        const now = Date.now();
        if (now - lastTapTime < 500) {
            tapCount++;
        } else {
            tapCount = 1;
        }
        lastTapTime = now;

        if (tapCount === 3) {
            stopEverything();
            tapCount = 0;
        }
    };

    function stopEverything() {
        isRecording = false;
        clearTimeout(recordingTimer);
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
        }
        status.innerText = "停止・保存しました";
        setTimeout(() => {
            status.innerText = "準備完了";
            controls.classList.remove('hidden'); // ボタンを再表示
        }, 2000);
    }

    setupCamera();
</script>
</body>
</html>
