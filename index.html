<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Manual Cam</title>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #video-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .hidden { display: none !important; }
        #controls { position: absolute; bottom: 40px; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 20px; z-index: 10; }
        button { width: 200px; padding: 20px; border: none; border-radius: 50px; font-size: 18px; font-weight: bold; }
        #recBtn { background: #ff3b30; color: white; } /* 録画ボタンは赤 */
        #recBtn.recording { background: #fff; color: #000; } /* 停止時は白 */
        #toggleView { background: rgba(255,255,255,0.2); color: white; border: 1px solid white; }
        #status { position: absolute; top: 40px; left: 0; right: 0; text-align: center; background: rgba(0,0,0,0.5); padding: 10px; pointer-events: none; }
        .rec-mark { color: red; animation: blink 1s infinite; margin-right: 5px; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<div id="status">カメラ準備中...</div>

<div id="video-container">
    <video id="webcam" autoplay playsinline muted></video>
    <div id="controls">
        <button id="recBtn">録画開始</button>
        <button id="toggleView">プレビュー表示/非表示</button>
    </div>
</div>

<script>
    const video = document.getElementById('webcam');
    const status = document.getElementById('status');
    const recBtn = document.getElementById('recBtn');
    const toggleView = document.getElementById('toggleView');
    
    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;

    // 1. カメラとマイクの起動
    async function setupCamera() {
        try {
            const stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" },
                audio: true
            });
            video.srcObject = stream;
            status.innerText = "待機中";
            return stream;
        } catch (e) {
            status.innerText = "カメラ・マイクの許可が必要です";
        }
    }

    // 2. 録画ボタンの動作
    recBtn.onclick = async () => {
        if (!isRecording) {
            // 録画開始
            const stream = video.srcObject || await setupCamera();
            if (!stream) return;

            recordedChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = (e) => {
                if (e.data.size > 0) recordedChunks.push(e.data);
            };
            mediaRecorder.onstop = saveVideo;

            mediaRecorder.start();
            isRecording = true;
            recBtn.innerText = "録画停止";
            recBtn.classList.add('recording');
            status.innerHTML = '<span class="rec-mark">●</span> 録画中...';
        } else {
            // 録画停止
            mediaRecorder.stop();
            isRecording = false;
            recBtn.innerText = "録画開始";
            recBtn.classList.remove('recording');
            status.innerText = "保存中...";
        }
    };

    // 3. プレビューのON/OFF
    toggleView.onclick = () => {
        video.classList.toggle('hidden');
    };

    // 4. 動画ファイルの保存
    function saveVideo() {
        const blob = new Blob(recordedChunks, { type: "video/mp4" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `video_${new Date().getTime()}.mp4`;
        a.click();
        status.innerText = "待機中";
    }

    // 最初にカメラを準備しておく
    setupCamera();
</script>
</body>
</html>
