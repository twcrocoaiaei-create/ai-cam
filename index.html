<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Stealth Cam</title>
    <style>
        /* 画面全体を真っ黒に固定 */
        body { 
            margin: 0; 
            background: #000; 
            color: white; 
            font-family: sans-serif; 
            overflow: hidden; 
            touch-action: none; /* ズームやスクロールを無効化 */
        }
        
        /* 映像は見せない */
        video { display: none; }
        
        /* 開始ボタンの配置 */
        #controls { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); 
            z-index: 100; 
        }

        button { 
            width: 220px; 
            padding: 25px; 
            border: none; 
            border-radius: 60px; 
            font-size: 20px; 
            font-weight: bold; 
            background: #ff3b30; 
            color: white;
            box-shadow: 0 4px 15px rgba(255,0,0,0.3);
        }

        /* 状態表示 */
        #status { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%);
            font-size: 24px; 
            text-align: center; 
            pointer-events: none; 
            z-index: 200;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body id="body">

<div id="status">システム準備完了</div>

<div id="controls">
    <button id="startBtn">撮影を開始する</button>
</div>

<video id="webcam" autoplay playsinline muted></video>

<script>
    const video = document.getElementById('webcam');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const controls = document.getElementById('controls');
    const body = document.getElementById('body');
    
    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;
    let recordingTimer;
    let stream;
    let pressTimer;

    // 1. カメラとマイクの初期化
    async function setupCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }, // 外カメラ使用
                audio: true
            });
            video.srcObject = stream;
        } catch (e) {
            status.innerText = "エラー: カメラを許可してください";
            console.error(e);
        }
    }

    // 2. 撮影開始処理
    startBtn.onclick = async () => {
        if (!stream) await setupCamera();
        
        isRecording = true;
        controls.classList.add('hidden'); // ボタンを消す
        status.innerText = "撮影中..."; // メッセージ表示

        // 1秒後に完全に真っ暗にする
        setTimeout(() => {
            if(isRecording) status.innerText = "";
        }, 1000);

        startNewSession();
    };

    // 3. 10秒ごとのループ録画セッション
    function startNewSession() {
        if (!isRecording) return;

        recordedChunks = [];
        // iPhone対応のためmimeTypeは指定せずブラウザに任せる
        mediaRecorder = new MediaRecorder(stream);
        
        mediaRecorder.ondataavailable = (e) => {
            if (e.data.size > 0) recordedChunks.push(e.data);
        };

        mediaRecorder.onstop = () => {
            saveVideo();
            // 停止指示が出ていなければ次の10秒を開始
            if (isRecording) startNewSession();
        };

        mediaRecorder.start();

        // 10秒（10000ms）で一度区切る
        recordingTimer = setTimeout(() => {
            if (mediaRecorder.state !== "inactive") {
                mediaRecorder.stop();
            }
        }, 10000);
    }

    // 4. 自動保存処理
    function saveVideo() {
        if (recordedChunks.length === 0) return;
        
        const blob = new Blob(recordedChunks, { type: "video/mp4" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        
        // ファイル名に現在の時間を付与して重複回避
        const now = new Date();
        const timeStr = now.getHours() + "h" + now.getMinutes() + "m" + now.getSeconds() + "s";
        
        a.href = url;
        a.download = `rec_${timeStr}.mp4`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        
        // メモリ解放
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    // 5. 【鉄壁ガード】20秒間の長押しで停止
    body.onpointerdown = (e) => {
        if (!isRecording) return;
        
        // 20秒（20000ms）のカウントダウン開始
        pressTimer = setTimeout(() => {
            stopEverything();
        }, 20000);
    };

    // 指を離したり、画面外にスライドしたらリセット
    body.onpointerup = body.onpointerleave = body.onpointercancel = () => {
        clearTimeout(pressTimer);
    };

    // 6. 全停止処理
    function stopEverything() {
        isRecording = false;
        clearTimeout(recordingTimer);
        
        if (mediaRecorder && mediaRecorder.state !== "inactive") {
            mediaRecorder.stop();
        }
        
        status.innerText = "停止・保存完了";
        
        // 2秒後に最初の画面に戻す
        setTimeout(() => {
            status.innerText = "システム準備完了";
            controls.classList.remove('hidden');
        }, 2000);
    }

    // ページ読み込み時にカメラを準備
    setupCamera();
</script>

</body>
</html>
