<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ultimate Stealth Cam</title>
    <style>
        /* 画面全体を真っ黒に固定 */
        body {
            margin: 0;
            background: #000;
            color: white;
            font-family: sans-serif;
            overflow: hidden;
            touch-action: none; /* ズームやスクロールを無効化 */
            -webkit-user-select: none;
            user-select: none;
        }

        /* 映像は見せない */
        video { display: none; }

        /* 開始ボタンの配置 */
        #controls {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 100;
        }

        button {
            width: 220px;
            padding: 25px;
            border: none;
            border-radius: 60px;
            font-size: 20px;
            font-weight: bold;
            background: #ff3b30;
            color: white;
            box-shadow: 0 4px 15px rgba(255,0,0,0.3);
        }

        /* 状態表示 */
        #status {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 24px;
            text-align: center;
            pointer-events: none;
            z-index: 200;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body id="body">

<div id="status">システム準備完了</div>

<div id="controls">
    <button id="startBtn">撮影を開始する</button>
</div>

<video id="webcam" autoplay playsinline muted></video>

<script>
    const video = document.getElementById('webcam');
    const statusEl = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const controls = document.getElementById('controls');
    const body = document.getElementById('body');

    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;
    let stream;
    let pressTimer;

    // -------- 1) カメラとマイクの初期化 --------
    async function setupCamera() {
        try {
            stream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: "environment" }, // 外カメラ使用（デバイスによっては無視されることあり）
                audio: true
            });
            video.srcObject = stream;
        } catch (e) {
            statusEl.innerText = "エラー: カメラ・マイクの許可が必要です";
            console.error(e);
            throw e;
        }
    }

    // -------- 2) 撮影開始（以後はメモリ上でずっと録画）--------
    startBtn.onclick = async () => {
        try {
            if (!stream) await setupCamera();

            recordedChunks = [];
            isRecording = true;
            controls.classList.add('hidden');
            statusEl.innerText = "撮影中...";

            // 1秒後に完全に真っ暗に（状態表示を消去）
            setTimeout(() => {
                if (isRecording) statusEl.innerText = "";
            }, 1000);

            // iOS Safariなども考慮し、mimeTypeは明示しない（ブラウザに任せる）
            // ※MediaRecorderはブラウザ・OSによって利用可能コーデックが異なります
            mediaRecorder = new MediaRecorder(stream);

            // データ受領（stop時だけ発火する環境もある）
            mediaRecorder.ondataavailable = (e) => {
                if (e.data && e.data.size > 0) recordedChunks.push(e.data);
            };

            // 停止後に1ファイルとして保存
            mediaRecorder.onstop = () => {
                saveSingleVideo();
            };

            // 区切らない：ずっと録画
            mediaRecorder.start(); // timesliceは指定しない
        } catch (err) {
            // 失敗時は開始UIを戻す
            isRecording = false;
            controls.classList.remove('hidden');
        }
    };

    // -------- 3) 長押し10秒で停止・保存 --------
    // ご要望に合わせて20秒 -> 10秒に変更
    const LONG_PRESS_MS = 10000;

    body.onpointerdown = () => {
        if (!isRecording) return;
        // 停止までのカウントダウン
        pressTimer = setTimeout(() => {
            stopEverything(); // 停止してダウンロード
        }, LONG_PRESS_MS);
    };

    // 指を離した/キャンセル/画面外スライドなら中断
    body.onpointerup = body.onpointerleave = body.onpointercancel = () => {
        clearTimeout(pressTimer);
    };

    // -------- 4) 停止処理 --------
    function stopEverything() {
        if (!isRecording) return;
        isRecording = false;

        try {
            if (mediaRecorder && mediaRecorder.state !== "inactive") {
                mediaRecorder.stop(); // onstopで保存呼び出し
            } else {
                // 非常時：すでにinactiveなら明示的に保存試行
                saveSingleVideo();
            }
        } catch (e) {
            console.error(e);
            // 最低限UIは戻す
            statusEl.innerText = "停止処理でエラーが発生しました";
            setTimeout(() => {
                statusEl.innerText = "システム準備完了";
                controls.classList.remove('hidden');
            }, 2000);
            return;
        }

        // 表示を一時的に戻す（保存完了はsaveSingleVideo側で表示）
        statusEl.innerText = "停止中...";
    }

    // -------- 5) 1ファイルとして保存 --------
    function saveSingleVideo() {
        try {
            if (!recordedChunks || recordedChunks.length === 0) {
                statusEl.innerText = "データなし（録画が短すぎる可能性）";
            } else {
                // ブラウザが選んだmimeTypeを優先（MediaRecorder.mimeTypeは一部環境で空）
                // ダウンロード拡張子はmp4優先、難しい場合はwebmにフォールバック
                // 実際の中身と拡張子が一致しないと再生できない場合がある点に留意
                const mimeType = mediaRecorder && mediaRecorder.mimeType ? mediaRecorder.mimeType : '';
                const isMp4 = mimeType.includes('mp4') || mimeType.includes('mp4;') || mimeType.includes('mpeg');
                const extension = isMp4 ? 'mp4' : 'webm';

                const blob = new Blob(recordedChunks, { type: mimeType || `video/${extension}` });
                const url = URL.createObjectURL(blob);
                const a = document.createElement("a");

                const now = new Date();
                const timeStr =
                    now.getHours().toString().padStart(2, '0') + "h" +
                    now.getMinutes().toString().padStart(2, '0') + "m" +
                    now.getSeconds().toString().padStart(2, '0') + "s";

                a.href = url;
                a.download = `rec_${timeStr}.${extension}`;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);

                setTimeout(() => URL.revokeObjectURL(url), 1000);

                statusEl.innerText = "停止・保存完了";
            }
        } catch (e) {
            console.error(e);
            statusEl.innerText = "保存中にエラーが発生しました";
        } finally {
            // UIを初期状態に戻す
            setTimeout(() => {
                statusEl.innerText = "システム準備完了";
                controls.classList.remove('hidden');
            }, 1500);
        }
    }

    // -------- 6) 初期準備（許可は開始ボタンクリックで）--------
    // 一部ブラウザはユーザー操作なしのgetUserMediaを拒否するため、
    // ページロード時には呼ばず、開始ボタンクリックでセットアップします。
    // もし先行準備したい場合は以下のコメントアウトを外してください。
    // setupCamera();
</script>

</body>
</html>
