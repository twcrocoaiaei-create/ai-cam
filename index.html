<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Stealth Cam</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #video-container { position: relative; width: 100vw; height: 100vh; display: flex; justify-content: center; align-items: center; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .hidden { display: none !important; }
        #controls { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: space-around; z-index: 10; }
        button { padding: 15px; background: rgba(50,50,50,0.8); color: white; border: none; border-radius: 10px; font-size: 14px; }
        #status { position: absolute; top: 20px; left: 20px; background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px; pointer-events: none; }
        .recording-mark { color: red; font-weight: bold; animation: blink 1s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } 100% { opacity: 1; } }
    </style>
</head>
<body>
<div id="status">システム起動中...</div>
<div id="video-container">
    <video id="webcam" autoplay playsinline muted></video>
    <div id="controls">
        <button id="startBtn">システム開始</button>
        <button id="toggleView">プレビューON/OFF</button>
    </div>
</div>
<script>
    const video = document.getElementById('webcam');
    const status = document.getElementById('status');
    const startBtn = document.getElementById('startBtn');
    const toggleView = document.getElementById('toggleView');
    let model;
    let mediaRecorder;
    let recordedChunks = [];
    let isRecording = false;
    let isHidden = false;
    async function loadModel() {
        status.innerText = "AIモデル読み込み中...";
        model = await cocoSsd.load();
        status.innerText = "準備完了";
    }
    async function setupCamera() {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: { facingMode: "environment" },
            audio: true
        });
        video.srcObject = stream;
        return new Promise((resolve) => {
            video.onloadedmetadata = () => resolve(stream);
        });
    }
    function startRecording(stream) {
        if (isRecording) return;
        recordedChunks = [];
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = (e) => recordedChunks.push(e.data);
        mediaRecorder.onstop = saveVideo;
        mediaRecorder.start();
        isRecording = true;
        status.innerHTML = '<span class="recording-mark">● 録画中</span> 人物を検知';
    }
    function stopRecording() {
        if (!isRecording) return;
        mediaRecorder.stop();
        isRecording = false;
        status.innerText = "待機中（人物を探しています）";
    }
    function saveVideo() {
        const blob = new Blob(recordedChunks, { type: "video/mp4" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = `detection_${new Date().getTime()}.mp4`;
        a.click();
    }
    async function detectFrame() {
        const predictions = await model.detect(video);
        const foundPerson = predictions.some(p => p.class === 'person');
        if (foundPerson && !isRecording) {
            startRecording(video.srcObject);
        } else if (!foundPerson && isRecording) {
            stopRecording();
        }
        requestAnimationFrame(detectFrame);
    }
    startBtn.onclick = async () => {
        const stream = await setupCamera();
        startBtn.classList.add('hidden');
        status.innerText = "監視開始...";
        detectFrame();
    };
    toggleView.onclick = () => {
        isHidden = !isHidden;
        video.classList.toggle('hidden', isHidden);
    };
    loadModel();
</script>
</body>
</html>
